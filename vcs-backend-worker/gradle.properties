# Allocate more heap and use Parallel GC — measurably faster for GraalVM native-image builds
# which are extremely CPU/memory intensive.
# G1 (the default) is tuned for low latency; Parallel GC maximises throughput, which is what you want
# for a one-shot build process (no end-user latency to worry about).
org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC

# Daemon is intentionally left unset (defaults to true locally).
# Docker passes --no-daemon on the command line, so daemon is never started there.
