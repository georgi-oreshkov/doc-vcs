# DataSource: H2 in-memory (PostgreSQL-compatible mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect; clear the vcs_core schema override (H2 uses default schema)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=

# Flyway: disabled for tests
spring.flyway.enabled=false

#  Security / JWT 
# Use jwk-set-uri only (lazy JWKS fetch) so Spring Boot doesn't call the
# Keycloak OIDC discovery endpoint at startup.
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/vcs/protocol/openid-connect/certs

#  Redis 
spring.data.redis.repositories.enabled=false

