spring.application.name=vcs-backend

# ?? DataSource ??????????????????????????????????????????????????????????????
# Defaults match docker-compose.yml port mapping (host 55432 ? container 5432).
# The database `vcs_db` and role `app_user` are created by DB/init-postgres.sh
# on first container start ? they are NOT the POSTGRES_DB / POSTGRES_USER values
# in compose (those belong to the postgres superuser, not the app).
#
# ? If you customise APP_USER / APP_PASSWORD in your .env (see .env.example
#   which uses vcs_server_user / vcs-dev-pass), you MUST also export the
#   matching DB_USER and DB_PASSWORD env vars when running the Spring app,
#   otherwise the defaults here ("app_user" / "secret") will not match.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:vcs_db}?currentSchema=vcs_core
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ?????????????????????????????????????????????????????????
# ddl-auto=validate means Hibernate checks the schema against entities but
# never creates/alters tables ? Flyway owns all DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=vcs_core
spring.jpa.open-in-view=false

# ?? Flyway ???????????????????????????????????????????????????????????????????
# Explicitly pin Flyway to vcs_core so flyway_schema_history lands in the
# same schema as the application tables, regardless of the JDBC URL defaults.
spring.flyway.schemas=vcs_core
spring.flyway.default-schema=vcs_core
spring.flyway.locations=classpath:db/migration

# ?? Security / Keycloak JWT ??????????????????????????????????????????????????
# Default port (18080) matches compose port mapping (host 18080 ? container 8080).
#
# ? The realm "vcs" is NOT provisioned automatically by docker-compose.
#   Before the application can validate JWTs you must:
#     1. Open http://localhost:18080 and log in with KC_BOOTSTRAP_ADMIN_USERNAME /
#        KC_BOOTSTRAP_ADMIN_PASSWORD (default: admin / admin).
#     2. Create a realm named "vcs" (or override KC_ISSUER_URI to match your realm name).
#     3. Create a client (e.g. "vcs-frontend") with the appropriate redirect URIs.
#     4. Create at least one test user and assign them an org role.
#   Without this, every authenticated request will return 401.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KC_ISSUER_URI:http://localhost:18080/realms/vcs}

# JWKS endpoint for fetching Keycloak's signing keys.
# Default: derived from issuer-uri (works when Keycloak is reachable at the issuer URL).
# Override with KC_JWK_SET_URI for fully-containerised deployments where the
# backend must fetch keys from http://keycloak:8080 (Docker DNS) while the
# issuer-uri stays http://localhost:18080 (matches the "iss" claim in tokens).
# See docs/kc_setup_container.md - Solution B for the full explanation.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KC_JWK_SET_URI:${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs}

# OAuth2 client details used by the /auth/login redirect endpoint.
# client-id must match the client created in the Keycloak "vcs" realm (Step 4.2 in DEV_SETUP.md).
# redirect-uri is where Keycloak sends the browser after a successful login (frontend callback).
# Override via env vars KC_CLIENT_ID and KC_REDIRECT_URI.
app.keycloak.client-id=${KC_CLIENT_ID:vcs-frontend}
app.keycloak.redirect-uri=${KC_REDIRECT_URI:http://localhost:5173/callback}

# ?? Redis ????????????????????????????????????????????????????????????????????
# Default port (16379) matches compose port mapping (host 16379 ? container 6379).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:16379}

# Redis Pub/Sub channels for communicating with vcs-backend-worker.
# Must match the worker's app.worker.redis.channel / result-channel properties.
app.redis.diff-jobs-channel=${WORKER_CHANNEL:vcs.diff.jobs}
app.redis.diff-results-channel=${WORKER_RESULT_CHANNEL:vcs.diff.results}

# ?? AWS S3 / MinIO ???????????????????????????????????????????????????????????
# Default endpoint / credentials match the docker-compose MinIO service
# (host port 19000, MINIO_ROOT_USER=minioadmin, MINIO_ROOT_PASSWORD=minioadmin).
#
# ? The bucket "vcs-documents" is NOT created automatically by docker-compose.
#   Before file uploads work you must create it:
#     Option A ? MinIO Console: open http://localhost:19001, log in with
#                minioadmin / minioadmin (or your .env values), and create
#                a bucket named "vcs-documents".
#     Option B ? mc CLI:
#                  mc alias set local http://localhost:19000 minioadmin minioadmin
#                  mc mb local/vcs-documents
#
# ? If you use .env.example credentials (MINIO_ROOT_USER=admin /
#   MINIO_ROOT_PASSWORD=12345678) you MUST also export S3_ACCESS_KEY=admin
#   and S3_SECRET_KEY=12345678 for the Spring app; the defaults here
#   ("minioadmin" / "minioadmin") will not authenticate otherwise.
#
# S3_REGION is cosmetic for MinIO (it accepts any string) but must match
# the actual AWS region if you switch to a real S3 bucket.
app.s3.endpoint=${S3_ENDPOINT:http://localhost:19000}
app.s3.bucket=${S3_BUCKET:vcs-documents}
app.s3.region=${S3_REGION:eu-central-1}
app.s3.access-key=${S3_ACCESS_KEY:minioadmin}
app.s3.secret-key=${S3_SECRET_KEY:minioadmin}
app.s3.presign-duration-minutes=${S3_PRESIGN_MINUTES:15}

# ?? Logging ??????????????????????????????????????????????????????????????????
logging.level.com.root.vcsbackend=DEBUG
logging.level.org.flywaydb=INFO

# ?? CORS ??????????????????????????????????????????????????????????????????????
# Comma-separated list of origins the browser is allowed to call the API from.
# Override with env var CORS_ALLOWED_ORIGINS for staging/production, e.g.:
#   CORS_ALLOWED_ORIGINS=https://app.example.com,https://staging.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ?? Actuator ?????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

