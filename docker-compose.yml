services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql
      - ./DB/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    networks:
      - docvcs

  pgadmin:
    image: dpage/pgadmin4
    container_name: vcs_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      # Disabling binary path warnings (common in Docker)
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "8888:80"
    depends_on:
      - db
    networks:
      - docvcs

networks:
  docvcs:
    driver: bridge

volumes:
  db-data:
    name: db_data
  pgadmin-data:
    name: pgadmin_data
