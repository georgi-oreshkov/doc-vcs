services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_USER: ${APP_USER:-app_user}
      APP_PASSWORD: ${APP_PASSWORD:-secret}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./DB/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - docvcs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - docvcs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - docvcs
    command: minio server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev
    environment:
      # Initial Admin Credentials (only used on first boot)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}

      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - docvcs
    depends_on:
      db:
        condition: service_healthy

networks:
  docvcs:
    driver: bridge

volumes:
  db-data:
  redis-data:
  minio-data:
