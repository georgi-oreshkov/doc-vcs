services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql
      - ./DB/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    networks:
      - docvcs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 2s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: vcs_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      # Disabling binary path warnings (common in Docker)
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "8888:80"
    depends_on:
      - db
    networks:
      - docvcs

  minio:
    image: minio/minio
    container_name: minio
    environment:
     - MINIO_ROOT_USER=${MINIO_ROOT_USER}
     - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
     - MINIO_CONSOLE_ADDRESS=:9002
    volumes:
      - minio-data:/data
    networks:
      - docvcs
    command: minio server /data
    ports: 
      - 9000:9000
      - 9002:9002

  keycloak:
    image: quay.io/keycloak/keycloak
    container_name: keycloak
    command: start-dev --import-realm --verbose
    environment:
      # Initial Admin Credentials (only used on first boot)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    networks:
      - docvcs
    depends_on:
      db:
        condition: service_healthy

networks:
  docvcs:
    driver: bridge

volumes:
  db-data:
  pgadmin-data:
  minio-data:
