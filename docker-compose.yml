services:
  db:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      APP_USER: ${APP_USER:-app_user}
      APP_PASSWORD: ${APP_PASSWORD:-secret}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - db-data:/var/lib/postgresql
      - ./DB/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - docvcs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 4s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - docvcs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_NOTIFY_WEBHOOK_ENABLE_stagingdiff: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_stagingdiff: "http://vcs-backend:8080/internal/webhook/minio"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_stagingdiff: "${MINIO_WEBHOOK_TOKEN:-dev-minio-webhook-token}"

    volumes:
      - minio-data:/data
    networks:
      - docvcs
    command: minio server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      # Initial Admin Credentials (only used on first boot)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}

      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/vcs-realm.json:/opt/keycloak/data/import/vcs-realm.json:ro
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - docvcs
    depends_on:
      db:
        condition: service_healthy

  vcs-backend:
    image: ghcr.io/georgi-oreshkov/doc-vcs/vcs-backend:latest
    build:
      # Context is the repo root so vcs-backend/Dockerfile can COPY doc/openapi.json
      context: .
      dockerfile: vcs-backend/Dockerfile
    container_name: vcs-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # ── Database ──────────────────────────────────────────────────────────
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vcs_db
      DB_USER: ${APP_USER:-app_user}
      DB_PASSWORD: ${APP_PASSWORD:-secret}
      # ── Keycloak JWT ──────────────────────────────────────────────────────
      # Solution B from docs/kc_setup_container.md:
      # KC_ISSUER_URI matches the "iss" claim Keycloak stamps into tokens
      # (KC_HOSTNAME=localhost → iss=http://localhost:18080/realms/vcs).
      # KC_JWK_SET_URI points at the Docker-internal address so the backend
      # can fetch signing keys without leaving the Docker network.
      KC_ISSUER_URI: http://localhost:18080/realms/vcs
      KC_JWK_SET_URI: http://keycloak:8080/realms/vcs/protocol/openid-connect/certs
      KC_CLIENT_ID: ${KC_CLIENT_ID:-vcs-frontend}
      KC_REDIRECT_URI: ${KC_REDIRECT_URI:-http://localhost:5173/callback}
      # ── Redis ─────────────────────────────────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CHANNEL: ${WORKER_CHANNEL:-vcs.diff.jobs}
      WORKER_RESULT_CHANNEL: ${WORKER_RESULT_CHANNEL:-vcs.diff.results}
      # ── S3 / MinIO ────────────────────────────────────────────────────────
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:19000
      S3_BUCKET: ${S3_BUCKET:-vcs-documents}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_WEBHOOK_TOKEN: ${MINIO_WEBHOOK_TOKEN:-dev-minio-webhook-token}
      # ── CORS ──────────────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    networks:
      - docvcs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started

  vcs-backend-worker:
    image: ghcr.io/georgi-oreshkov/doc-vcs/vcs-backend-worker:latest
    build:
      context: ./vcs-backend-worker
      dockerfile: Dockerfile
    container_name: vcs-backend-worker
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:19000}
      S3_BUCKET: ${S3_BUCKET:-vcs-documents}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_PRESIGN_MINUTES: ${S3_PRESIGN_MINUTES:-15}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vcs_db
      DB_USER: ${APP_USER:-app_user}
      DB_PASSWORD: ${APP_PASSWORD:-secret}
      WORKER_CHANNEL: ${WORKER_CHANNEL:-vcs.diff.jobs}
      WORKER_RESULT_CHANNEL: ${WORKER_RESULT_CHANNEL:-vcs.diff.results}
    networks:
      - docvcs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  docvcs:
    driver: bridge

volumes:
  db-data:
    name: doc-vcs-postgres-data
  redis-data:
    name: doc-vcs-redis-data
  minio-data:
    name: doc-vcs-minio-data
