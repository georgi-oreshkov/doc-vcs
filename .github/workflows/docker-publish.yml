name: Build & publish Docker images

on:
  push:
    branches: ["main"]
  # Allow building a PR image without pushing it (useful for testing)
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  OWNER: georgi-oreshkov

jobs:
  build-backend:
    name: vcs-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vcs-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vcs-backend/Dockerfile
          # Only push on merges to main; PRs just build to validate
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/doc-vcs/vcs-backend:latest
          # Store BuildKit layer cache in GitHub Actions cache.
          # mode=max also caches intermediate builder layers so the dep-download
          # layer survives across runs even when source changes.
          cache-from: type=gha,scope=vcs-backend
          cache-to:   type=gha,scope=vcs-backend,mode=max

  build-worker:
    name: vcs-backend-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push vcs-backend-worker
        uses: docker/build-push-action@v6
        with:
          context: vcs-backend-worker
          file: vcs-backend-worker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/doc-vcs/vcs-backend-worker:latest
          cache-from: type=gha,scope=vcs-backend-worker
          cache-to:   type=gha,scope=vcs-backend-worker,mode=max
